<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Generate App Icons — Pics2PDF</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 48px auto; padding: 0 24px; color: #1c1d1a; }
    h1 { font-size: 1.3rem; margin-bottom: 4px; }
    p { color: #5e605a; font-size: 14px; margin: 0 0 24px; }
    .row { display: flex; align-items: center; gap: 16px; margin: 14px 0; }
    .row img { width: 60px; height: 60px; border-radius: 13px; border: 1px solid #e9e7df; flex-shrink: 0; }
    .row button {
      padding: 8px 16px; background: #2563EB; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    .row button:hover { background: #1d4ed8; }
    .row span { font-size: 13px; color: #5e605a; }
    .note { margin-top: 32px; padding: 12px 16px; background: #f4f3ee; border-radius: 8px; font-size: 13px; color: #5e605a; }
  </style>
</head>
<body>
  <h1>Pics2PDF — iOS Icon Generator</h1>
  <p>Open this page in a browser, click each button, and save the downloaded PNGs into this same folder (<code>assets/app-logo/</code>).</p>
  <div id="icons"></div>
  <canvas id="c" style="display:none"></canvas>
  <p class="note">iOS automatically applies rounded corners and shadows — the PNG should be a plain square with no padding or rounding.</p>

  <script>
    const SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" fill="#2563EB"/><path d="M174 110 L110 110 L110 174" stroke="white" stroke-width="24" fill="none" stroke-linecap="square"/><path d="M338 110 L402 110 L402 174" stroke="white" stroke-width="24" fill="none" stroke-linecap="square"/><path d="M110 338 L110 402 L174 402" stroke="white" stroke-width="24" fill="none" stroke-linecap="square"/><path d="M402 338 L402 402 L338 402" stroke="white" stroke-width="24" fill="none" stroke-linecap="square"/><text x="256" y="347" text-anchor="middle" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-weight="700" font-size="238" fill="white">2</text></svg>`;

    const svgUrl = 'data:image/svg+xml,' + encodeURIComponent(SVG);
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const SIZES = [
      { size: 180, name: 'apple-touch-icon-180x180.png', label: '180×180 — iPhone @3x' },
      { size: 167, name: 'apple-touch-icon-167x167.png', label: '167×167 — iPad Pro @2x' },
      { size: 152, name: 'apple-touch-icon-152x152.png', label: '152×152 — iPad @2x' },
    ];

    function renderIcon(size) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          canvas.width = size;
          canvas.height = size;
          ctx.clearRect(0, 0, size, size);
          ctx.drawImage(img, 0, 0, size, size);
          resolve(canvas.toDataURL('image/png'));
        };
        img.src = svgUrl;
      });
    }

    const container = document.getElementById('icons');

    SIZES.forEach(({ size, name, label }) => {
      const row = document.createElement('div');
      row.className = 'row';

      const preview = document.createElement('img');
      preview.alt = label;

      const btn = document.createElement('button');
      btn.textContent = `Download ${name}`;
      btn.disabled = true;

      const desc = document.createElement('span');
      desc.textContent = label;

      renderIcon(size).then(dataUrl => {
        preview.src = dataUrl;
        btn.disabled = false;
        btn.onclick = () => {
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = name;
          a.click();
        };
      });

      row.appendChild(preview);
      row.appendChild(btn);
      row.appendChild(desc);
      container.appendChild(row);
    });
  </script>
</body>
</html>
